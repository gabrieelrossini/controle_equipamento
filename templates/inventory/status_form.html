{% extends "base.html" %}

{% block content %}
<h1>{% if object %}Editar{% else %}Novo{% endif %} Status</h1>
<form method="post" class="mb-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a class="btn btn-secondary" href="{% url 'status_list' %}">Cancelar</a>
</form>
{% endblock %}
