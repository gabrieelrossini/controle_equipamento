{% extends "base.html" %}

{% block content %}
<h1>{% if object %}Editar{% else %}Nova{% endif %} Sala</h1>
<form method="post" class="mb-3">
    {% csrf_token %}
    <div class="mb-3">
        <label for="{{ form.nome.id_for_label }}" class="form-label">{{ form.nome.label }}</label>
        {{ form.nome }}
    </div>
    <div class="mb-3">
        <label for="{{ form.descricao.id_for_label }}" class="form-label">{{ form.descricao.label }}</label>
        {{ form.descricao }}
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a class="btn btn-secondary" href="{% url 'sala_list' %}">Cancelar</a>
</form>
{% endblock %}
