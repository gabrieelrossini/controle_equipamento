{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Statuses</h1>
    <a class="btn btn-success" href="{% url 'status_create' %}">Novo Status</a>
</div>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for status in statuses %}
        <tr>
            <td>{{ status.nome }}</td>
            <td>{{ status.descricao }}</td>
            <td>
                <a href="{% url 'status_update' status.pk %}" class="btn btn-sm btn-primary">Editar</a>
                <a href="{% url 'status_delete' status.pk %}" class="btn btn-sm btn-danger">Excluir</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">Nenhum status cadastrado.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
