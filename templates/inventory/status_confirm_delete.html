{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Confirmar Exclusão</h2>
    <p>Tem certeza que deseja excluir o status <strong>{{ object.nome }}</strong>?</p>
    <p class="text-muted small">Equipamentos vinculados a este status impedirão a exclusão.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Excluir</button>
        <a href="{% url 'status_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
