{% extends "base.html" %}

{% block content %}
<h1>{% if object %}Editar{% else %}Novo{% endif %} Equipamento</h1>
<form method="post" class="mb-3">
    {% csrf_token %}
    <div class="mb-3">
        <label for="{{ form.nome.id_for_label }}" class="form-label">{{ form.nome.label }}</label>
        {{ form.nome }}
    </div>
    <div class="mb-3">
        <label for="{{ form.sala.id_for_label }}" class="form-label">{{ form.sala.label }}</label>
        {{ form.sala }}
    </div>
    <div class="mb-3">
        <label for="{{ form.status.id_for_label }}" class="form-label">{{ form.status.label }}</label>
        {{ form.status }}
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a class="btn btn-secondary" href="{% url 'equipamento_list' %}">Cancelar</a>
</form>
{% endblock %}
